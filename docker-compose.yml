services:
  db:
    # Industry standard for open-source geospatial data
    # Uses Spatial Indices (GiST) for high-performance radius queries
    image: postgis/postgis:16-3.4
    container_name: pawnder_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # Ensures persistence layer data is not lost on container restart
      - postgres_data:/var/lib/postgresql/data
      # Automated setup: Runs your SQL script to create Sia, Matthew, and Devin's roles
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    # Builds from the Dockerfile in the current directory
    build: .
    container_name: pawnder_api
    ports:
      - "8000:8000"
    environment:
      # Uses the 'db' service name to connect the API to the persistence layer
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind mount for "Hot Reload" feature to speed up development
      - .:/app
    stdin_open: true
    tty: true

volumes:
  postgres_data: